<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miles's Spelling Game</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔤</text></svg>">
<link rel="stylesheet" href="style.css?v=7">
</head>
<body>

<div id="tier-unlock-banner" class="hidden">🎉 New words unlocked! 🎉</div>

<div id="start-overlay">
  <button id="start-btn">▶️ Tap to Play!</button>
</div>

<div id="app">
  <header>
    <h1>Miles's Spelling Game</h1>
    <div id="tier-badge">Tier 1</div>
  </header>

  <main>
    <div id="word-row">
      <div id="picture-frame">
        <img id="word-image" src="" alt="">
      </div>
      <button id="hear-btn" aria-label="Hear the word" title="Hear the word">🔊</button>
    </div>

    <div id="letter-boxes"></div>

    <div id="feedback" aria-live="polite"></div>

    <div id="onscreen-keyboard"></div>
  </main>

  <footer>
    <div id="scoreboard">
      <span id="last-score"></span>
      <span id="session-stats"></span>
    </div>
    <button id="reset-btn">Reset Progress</button>
  </footer>
</div>

<script src="words.js?v=7"></script>
<script src="app.js?v=7"></script>
</body>
</html>
