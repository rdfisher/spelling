<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miles' Spelling Game</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔤</text></svg>">
<link rel="stylesheet" href="style.css?v=36">
</head>
<body>

<div id="tier-unlock-banner" class="hidden">🎉 New words unlocked! 🎉</div>

<div id="score-face-overlay" class="hidden">
  <img id="score-face-image" src="" alt="">
</div>

<div id="start-overlay">
  <div id="preload">
    <div id="preload-label">Loading pictures…</div>
    <div id="preload-bar"><div id="preload-fill"></div></div>
    <div id="preload-count"></div>
  </div>
  <div id="start-buttons" class="hidden">
    <button id="spell-btn" class="start-choice">✏️ Spell</button>
    <button id="read-btn" class="start-choice read">📖 Read</button>
    <button id="count-btn" class="start-choice count">🔢 Count</button>
    <button id="maths-btn" class="start-choice maths">➕ Maths</button>
  </div>
</div>

<div id="summary-overlay" class="hidden">
  <div id="summary-card">
    <img id="summary-face" src="" alt="">
    <h2 id="summary-title">Great game!</h2>
    <p id="summary-tiers" class="hidden"></p>
    <div id="summary-stats">
      <div class="summary-stat"><span id="summary-words">0</span><small>words</small></div>
      <div class="summary-stat"><span id="summary-avg">0</span><small>avg score</small></div>
    </div>
    <div id="summary-buttons">
      <button id="play-again-btn" class="start-choice">🔁 Play again</button>
      <button id="menu-btn" class="start-choice menu">🏠 Menu</button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <h1 id="game-title">Miles' Spelling Game</h1>
    <div id="tier-badge">Tier 1</div>
    <div id="turn-progress" aria-hidden="true"></div>
  </header>

  <main id="spell-main">
    <div id="word-row">
      <div id="picture-frame">
        <img id="word-image" src="" alt="">
      </div>
      <button id="hear-btn" aria-label="Hear the word" title="Hear the word">🔊</button>
    </div>

    <div id="letter-boxes"></div>

    <div id="feedback" aria-live="polite"></div>

    <div id="onscreen-keyboard"></div>
  </main>

  <main id="read-main" class="hidden">
    <p id="read-prompt">Tap the picture:</p>
    <div id="read-word"></div>
    <div id="read-feedback" aria-live="polite"></div>
    <div id="read-choices"></div>
  </main>

  <main id="count-main" class="hidden">
    <p id="count-prompt">How many?</p>
    <div id="count-objects"></div>
    <div id="count-feedback" aria-live="polite"></div>
    <div id="count-typed">?</div>
    <div id="count-keypad"></div>
  </main>

  <main id="maths-main" class="hidden">
    <p id="maths-prompt">What's the answer?</p>
    <div id="maths-question">
      <span id="maths-sum"></span>
      <span id="maths-typed">?</span>
    </div>
    <div id="maths-blocks" class="hidden" aria-hidden="true"></div>
    <div id="maths-feedback" aria-live="polite"></div>
    <div id="maths-keypad"></div>
  </main>

  <footer>
    <div id="scoreboard">
      <span id="last-score"></span>
      <span id="session-stats"></span>
    </div>
    <button id="reset-btn">Reset Progress</button>
    <p id="attribution" style="font-size:11px;opacity:0.6;margin:8px 0 0;text-align:center;line-height:1.4">
      Emoji graphics by <a href="https://github.com/twitter/twemoji" style="color:inherit">Twemoji</a>,
      licensed <a href="https://creativecommons.org/licenses/by/4.0/" style="color:inherit">CC-BY 4.0</a>.
    </p>
  </footer>
</div>

<script src="words.js?v=36"></script>
<script src="app.js?v=36"></script>
</body>
</html>
